<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warranty Claim Tracker</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>


*{
    box-sizing:border-box;
}


body{

    font-family:Arial,sans-serif;
    background:#f4f7fb;
    margin:0;

}



/* HEADER */

.topbar{

    background:#0f172a;

    height:75px;

    padding:0 30px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

}



.logo-section{

    display:flex;

    align-items:center;

    gap:15px;

}



.header-logo{

    height:42px;

}



.logo-section h1{

    color:white;

    margin:0;

    font-size:22px;

}



.logo-section p{

    color:#cbd5e1;

    font-size:13px;

    margin:3px 0;

}




.home-btn{


    background:#2563eb;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    font-weight:600;

}



.home-btn:hover{

    background:#1d4ed8;

}





.container{

    padding:30px;

}




.summary{


    background:white;

    padding:20px;

    border-radius:12px;

    margin-bottom:20px;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

}



.summary h2{

    color:#1e3a8a;

    margin-top:0;

}




/* SEARCH */


.search-box{


    background:white;

    padding:15px;

    border-radius:12px;

    margin-bottom:20px;

    display:flex;

    gap:10px;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

}



.search-box input{


    flex:1;

    padding:12px 15px;

    border:1px solid #d1d5db;

    border-radius:8px;

}



.search-box button{


    background:#2563eb;

    color:white;

    border:none;

    padding:12px 22px;

    border-radius:8px;

    cursor:pointer;

    font-weight:600;

}




.search-box button:hover{

    background:#1d4ed8;

}







/* TABLE */


table{


    width:100%;

    table-layout:fixed;

    border-collapse:collapse;

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

}




/* COLUMN WIDTH */

th:nth-child(1),
td:nth-child(1){

    width:12%;

}



th:nth-child(2),
td:nth-child(2){

    width:12%;

}



th:nth-child(3),
td:nth-child(3){

    width:22%;

}



th:nth-child(4),
td:nth-child(4){

    width:15%;

}



th:nth-child(5),
td:nth-child(5){

    width:17%;

}



th:nth-child(6),
td:nth-child(6){

    width:22%;

}



th{


    background:#2563eb;

    color:white;

    padding:14px;

    text-align:left;

    font-size:14px;

}



td{


    padding:12px;

    border-bottom:1px solid #e5e7eb;

    vertical-align:top;

    word-wrap:break-word;

    font-size:14px;

}




/* STATUS */


.status{


    padding:6px 12px;

    border-radius:20px;

    font-size:12px;

    font-weight:bold;

    display:inline-block;

}




.approved{

    background:#dcfce7;

    color:#166534;

}



.rejected{

    background:#fee2e2;

    color:#b91c1c;

}



.pending{

    background:#fef3c7;

    color:#92400e;

}



.for-approval{

    background:#dbeafe;

    color:#1e40af;

}



</style>


</head>




<body>



<header class="topbar">


<div class="logo-section">


<img src="company-logo.png"
class="header-logo">


<div>

<h1>Warranty Management System</h1>

<p>Warranty Tracker Portal</p>

</div>


</div>



<button class="home-btn" onclick="goHome()">

<i class="fas fa-home"></i>

Home

</button>


</header>






<div class="container">



<div class="summary">


<h2>Warranty Claim Monitoring Dashboard</h2>


<p>

Monitor warranty claim SO approval status.

</p>

<p id="lastUpdated"
style="
margin-top:10px;
font-size:13px;
color:#64748b;
font-weight:600;
">
Last Updated: --
</p>

</div>





<div class="search-box">


<input

type="text"

id="soSearch"

placeholder="Search SO No..."

onkeyup="filterSO()">



<button onclick="clearSearch()">

Clear

</button>




</div>




<table>


<thead>


<tr>

<th>Date Submitted</th>

<th>SO No.</th>

<th>Customer Name</th>

<th>Brand Name</th>

<th>Warranty Claim Status</th>

<th>Warranty SO Approval by COO</th>


</tr>


</thead>



<tbody id="approvalTable">


<tr>

<td colspan="6" align="center">

Loading approval records...

</td>

</tr>


</tbody>


</table>



</div>

<script>

const SHEET_ID = "1x5XTCLu9A2OtbAm8X-3x8rsZgzublUPo-W6tJKezAMw";
const SHEET_NAME = "Form Responses 1";

let approvalData = [];
let lastDataHash = "";

/* ==========================
   FETCH GOOGLE SHEET
========================== */

async function fetchSheetData() {

    const url =
        `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`;

    console.log("Fetching:", url);

    const response = await fetch(url, {
        cache: "no-store"
    });

    const text = await response.text();

    console.log("Response Status:", response.status);
    console.log("Response Body:", text);

    if (!response.ok) {
        throw new Error(
            `HTTP ${response.status} - ${text}`
        );
    }

    let data;

    try {
        data = JSON.parse(text);
    } catch (err) {
        throw new Error("Invalid JSON response");
    }

    if (!Array.isArray(data)) {
        throw new Error("Invalid sheet response");
    }

    console.log("Records Found:", data.length);

    data.sort((a, b) => {
        return (
            new Date(b["Timestamp"] || 0) -
            new Date(a["Timestamp"] || 0)
        );
    });

    return data;
}

/* ==========================
   LOAD DATA
========================== */

async function loadApproval() {

    try {

        const newData = await fetchSheetData();

        const newHash = JSON.stringify(newData);

        if (newHash !== lastDataHash) {

            approvalData = newData;
            lastDataHash = newHash;

            applyCurrentFilter();

            console.log("Sheet Updated");
        }

        updateLastRefresh();

    } catch (error) {

        console.error("LOAD ERROR:", error);

        document.getElementById("approvalTable").innerHTML = `
        <tr>
            <td colspan="6" style="padding:20px;text-align:center;color:red;">
                Failed to load records.<br>
                ${error.message}
            </td>
        </tr>`;

        updateLastRefresh();
    }
}

/* ==========================
   DISPLAY TABLE
========================== */

function displayApproval(data) {

    let html = "";

    if (!data || data.length === 0) {

        html = `
        <tr>
            <td colspan="6" style="text-align:center;padding:20px;">
                No records found.
            </td>
        </tr>`;

        document.getElementById("approvalTable").innerHTML = html;
        return;
    }

    data.forEach(row => {

        const claimStatus =
            row["Warranty SO Claim Status"] ||
            row["Warranty Claim Status"] ||
            "Pending";

        const cooStatus =
            row["Warranty SO Approval by COO"] ||
            row["Warranty SO Approval by Ms. Carina"] ||
            "Pending";

        let claimCss = "pending";

        switch (claimStatus.toLowerCase()) {

            case "approved":
                claimCss = "approved";
                break;

            case "rejected":
                claimCss = "rejected";
                break;

            case "under evaluation":
                claimCss = "for-approval";
                break;
        }

        let cooCss = "pending";

        switch (cooStatus.toLowerCase()) {

            case "approved":
                cooCss = "approved";
                break;

            case "rejected":
                cooCss = "rejected";
                break;

            case "for approval":
            case "awaiting approval":
                cooCss = "for-approval";
                break;
        }

        html += `
        <tr>

            <td>${row["Timestamp"] || "-"}</td>

            <td>
                ${row["SO No"] ||
                  row["SO No."] ||
                  row["SO Number"] ||
                  "-"}
            </td>

            <td>${row["Customer Name"] || "-"}</td>

            <td>
                ${row["Brand Name"] ||
                  row["Brand Name:"] ||
                  "-"}
            </td>

            <td>
                <span class="status ${claimCss}">
                    ${claimStatus}
                </span>
            </td>

            <td>
                <span class="status ${cooCss}">
                    ${cooStatus}
                </span>
            </td>

        </tr>`;
    });

    document.getElementById("approvalTable").innerHTML = html;
}

/* ==========================
   SEARCH
========================== */

function filterSO() {
    applyCurrentFilter();
}

function applyCurrentFilter() {

    const search =
        document.getElementById("soSearch")
        .value
        .trim()
        .toLowerCase();

    if (!search) {
        displayApproval(approvalData);
        return;
    }

    const filtered = approvalData.filter(row => {

        const soNumber =
            row["SO No"] ||
            row["SO No."] ||
            row["SO Number"] ||
            "";

        return soNumber
            .toString()
            .toLowerCase()
            .includes(search);
    });

    displayApproval(filtered);
}

function clearSearch() {

    document.getElementById("soSearch").value = "";

    displayApproval(approvalData);
}

/* ==========================
   LAST UPDATED
========================== */

function updateLastRefresh() {

    const el =
        document.getElementById("lastUpdated");

    if (!el) return;

    el.innerHTML =
        "Last Updated: " +
        new Date().toLocaleString();
}

/* ==========================
   HOME
========================== */

function goHome() {
    window.location.href = "home.html";
}

/* ==========================
   INITIAL LOAD
========================== */

document.addEventListener("DOMContentLoaded", () => {

    loadApproval();

    // Auto refresh every 10 seconds
    setInterval(loadApproval, 10000);

});

</script>

</body>

</html>
