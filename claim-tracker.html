<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warranty Claim Tracker</title>


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>


*{
    box-sizing:border-box;
}


body{

    font-family:Arial,sans-serif;
    background:#f4f7fb;
    margin:0;

}



/* HEADER */

.topbar{

    background:#0f172a;

    height:75px;

    padding:0 30px;

    display:flex;

    justify-content:space-between;

    align-items:center;

    box-shadow:0 2px 10px rgba(0,0,0,.08);

}



.logo-section{

    display:flex;

    align-items:center;

    gap:15px;

}



.header-logo{

    height:42px;

}



.logo-section h1{

    color:white;

    margin:0;

    font-size:22px;

}



.logo-section p{

    color:#cbd5e1;

    font-size:13px;

    margin:3px 0;

}




.home-btn{


    background:#2563eb;

    color:white;

    border:none;

    padding:10px 18px;

    border-radius:8px;

    cursor:pointer;

    font-weight:600;

}



.home-btn:hover{

    background:#1d4ed8;

}





.container{

    padding:30px;

}




.summary{


    background:white;

    padding:20px;

    border-radius:12px;

    margin-bottom:20px;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

}



.summary h2{

    color:#1e3a8a;

    margin-top:0;

}




/* SEARCH */


.search-box{


    background:white;

    padding:15px;

    border-radius:12px;

    margin-bottom:20px;

    display:flex;

    gap:10px;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

}



.search-box input{


    flex:1;

    padding:12px 15px;

    border:1px solid #d1d5db;

    border-radius:8px;

}



.search-box button{


    background:#2563eb;

    color:white;

    border:none;

    padding:12px 22px;

    border-radius:8px;

    cursor:pointer;

    font-weight:600;

}




.search-box button:hover{

    background:#1d4ed8;

}







/* TABLE */


table{


    width:100%;

    table-layout:fixed;

    border-collapse:collapse;

    background:white;

    border-radius:12px;

    overflow:hidden;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

}




/* COLUMN WIDTH */

th:nth-child(1),
td:nth-child(1){

    width:12%;

}



th:nth-child(2),
td:nth-child(2){

    width:12%;

}



th:nth-child(3),
td:nth-child(3){

    width:22%;

}



th:nth-child(4),
td:nth-child(4){

    width:15%;

}



th:nth-child(5),
td:nth-child(5){

    width:17%;

}



th:nth-child(6),
td:nth-child(6){

    width:22%;

}



th{


    background:#2563eb;

    color:white;

    padding:14px;

    text-align:left;

    font-size:14px;

}



td{


    padding:12px;

    border-bottom:1px solid #e5e7eb;

    vertical-align:top;

    word-wrap:break-word;

    font-size:14px;

}




/* STATUS */


.status{


    padding:6px 12px;

    border-radius:20px;

    font-size:12px;

    font-weight:bold;

    display:inline-block;

}




.approved{

    background:#dcfce7;

    color:#166534;

}



.rejected{

    background:#fee2e2;

    color:#b91c1c;

}



.pending{

    background:#fef3c7;

    color:#92400e;

}



.for-approval{

    background:#dbeafe;

    color:#1e40af;

}



</style>


</head>




<body>



<header class="topbar">


<div class="logo-section">


<img src="company-logo.png"
class="header-logo">


<div>

<h1>Warranty Management System</h1>

<p>Warranty Tracker Portal</p>

</div>


</div>



<button class="home-btn" onclick="goHome()">

<i class="fas fa-home"></i>

Home

</button>


</header>






<div class="container">



<div class="summary">


<h2>Warranty Claim Monitoring Dashboard</h2>


<p>

Monitor warranty claim SO approval status.

</p>


</div>





<div class="search-box">


<input

type="text"

id="soSearch"

placeholder="Search SO No..."

onkeyup="filterSO()">



<button onclick="clearSearch()">

Clear

</button>



</div>






<table>


<thead>


<tr>

<th>Date Submitted</th>

<th>SO No.</th>

<th>Customer Name</th>

<th>Brand Name</th>

<th>Warranty Claim Status</th>

<th>Warranty SO Approval by COO</th>


</tr>


</thead>



<tbody id="approvalTable">


<tr>

<td colspan="6" align="center">

Loading approval records...

</td>

</tr>


</tbody>


</table>

</div>

<script>

const SHEET_ID = "1x5XTCLu9A2OtbAm8X-3x8rsZgzublUPo-W6tJKezAMw";
const SHEET_NAME = "Form Responses 1";

let approvalData = [];
let lastDataHash = "";

// LOAD DATA FROM GOOGLE SHEET
async function loadApproval() {

    try {

        const response = await fetch(
            `https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}?t=${Date.now()}`
        );

        const data = await response.json();

        // CHECK IF DATA CHANGED
        const currentHash = JSON.stringify(data);

        if (currentHash === lastDataHash) {
            return;
        }

        lastDataHash = currentHash;

        approvalData = data;

        // SORT NEWEST TO OLDEST
        approvalData.sort((a, b) => {
            return new Date(b.Timestamp) - new Date(a.Timestamp);
        });

        filterSO();

    } catch (error) {

        console.error("Error loading data:", error);

        document.getElementById("approvalTable").innerHTML = `
        <tr>
            <td colspan="6" align="center">
                Failed to load records.
            </td>
        </tr>
        `;
    }
}

// DISPLAY TABLE
function displayApproval(data) {

    let html = "";

    if (!data.length) {

        html = `
        <tr>
            <td colspan="6" align="center">
                No records found
            </td>
        </tr>
        `;

        document.getElementById("approvalTable").innerHTML = html;
        return;
    }

    data.forEach(row => {

        const dateSubmitted = row["Timestamp"] || "-";
        const soNo = row["SO No"] || "-";
        const customerName = row["Customer Name"] || "-";
        const brandName = row["Brand Name:"] || row["Brand Name"] || "-";

        const claimStatus =
            row["Warranty SO Claim Status"] || "Pending";

        const cooStatus =
            row["Warranty SO Approval by COO"] ||
            row["Warranty SO Approval by Ms. Carina"] ||
            "Pending";

        let claimCss = "pending";
        let cooCss = "pending";

        switch (claimStatus.toLowerCase()) {

            case "approved":
                claimCss = "approved";
                break;

            case "rejected":
                claimCss = "rejected";
                break;

            case "under evaluation":
                claimCss = "for-approval";
                break;

            case "for approval":
                claimCss = "for-approval";
                break;
        }

        switch (cooStatus.toLowerCase()) {

            case "approved":
                cooCss = "approved";
                break;

            case "rejected":
                cooCss = "rejected";
                break;

            case "for approval":
            case "awaiting approval":
                cooCss = "for-approval";
                break;
        }

        html += `
        <tr>

            <td>${dateSubmitted}</td>

            <td>${soNo}</td>

            <td>${customerName}</td>

            <td>${brandName}</td>

            <td>
                <span class="status ${claimCss}">
                    ${claimStatus}
                </span>
            </td>

            <td>
                <span class="status ${cooCss}">
                    ${cooStatus}
                </span>
            </td>

        </tr>
        `;
    });

    document.getElementById("approvalTable").innerHTML = html;
}

// SEARCH FILTER
function filterSO() {

    const searchText = document
        .getElementById("soSearch")
        .value
        .toLowerCase()
        .trim();

    const filtered = approvalData.filter(row => {

        const soNo = (row["SO No"] || "").toLowerCase();

        return soNo.includes(searchText);
    });

    displayApproval(filtered);
}

// CLEAR SEARCH
function clearSearch() {

    document.getElementById("soSearch").value = "";

    displayApproval(approvalData);
}

// HOME BUTTON
function goHome() {

    window.location.href = "home.html";
}

// INITIAL LOAD
loadApproval();

// AUTO UPDATE EVERY 5 SECONDS
setInterval(() => {
    loadApproval();
}, 5000);

</script>

</body>

</html>
