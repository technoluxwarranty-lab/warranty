<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warranty Claim Tracker</title>


<style>

body{

font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;

}


/* HEADER */

.header{

background:linear-gradient(135deg,#2563eb,#1d4ed8);
color:white;
padding:20px 30px;
display:flex;
justify-content:space-between;
align-items:center;

}


.header h1{

margin:0;
font-size:24px;

}


.home-btn{

background:white;
color:#2563eb;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:600;

}


.home-btn:hover{

transform:translateY(-2px);

}




.container{

padding:30px;

}




.summary{

background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 3px 12px rgba(0,0,0,.08);

}



.summary h2{

margin-top:0;
color:#1e3a8a;

}





/* SEARCH */


.search-box{

background:white;
padding:15px;
margin-bottom:20px;
border-radius:12px;
display:flex;
gap:10px;
box-shadow:0 3px 12px rgba(0,0,0,.08);

}



.search-box input{

flex:1;
padding:12px 15px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:14px;

}




.search-box button{

background:#2563eb;
color:white;
border:none;
padding:12px 22px;
border-radius:8px;
cursor:pointer;
font-weight:600;

}




.search-box button:hover{

background:#1d4ed8;

}





/* TABLE */


table{

width:100%;
table-layout:fixed;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 12px rgba(0,0,0,.08);

}



th{

background:#2563eb;
color:white;
padding:14px;
text-align:left;

}



td{

padding:12px;
border-bottom:1px solid #e5e7eb;
word-wrap:break-word;
vertical-align:top;

}



/* COLUMN WIDTH */


.date{

width:14%;

}


.so{

width:14%;

}


.customer{

width:20%;

}


.brand{

width:15%;

}


.claim-status{

width:17%;

}


.coo-status{

width:20%;

}







/* STATUS */


.status{

padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
display:inline-block;

}



.approved{

background:#dcfce7;
color:#166534;

}



.rejected{

background:#fee2e2;
color:#b91c1c;

}



.pending{

background:#fef3c7;
color:#92400e;

}



.for-approval{

background:#dbeafe;
color:#1e40af;

}


.topbar{
    background:#0f172a;
    height:75px;
    padding:0 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.logo-section{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-section h1{
    color:white;
    font-size:22px;
    margin:0;
}

.logo-section p{
    color:#cbd5e1;
    font-size:13px;
    margin-top:2px;
}

.header-logo{
    height:42px;
    width:auto;
}

.home-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    transition:.3s;
}

.home-btn:hover{
    background:#1d4ed8;
}



</style>


</head>



<body>




<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<header class="topbar">

    <div class="logo-section">
        <img src="company-logo.png" alt="Company Logo" class="header-logo">

        <div>
            <h1>Warranty Management System</h1>
            <p>Warranty Tracker Portal</p>
        </div>
    </div>

    <button class="home-btn" onclick="goHome()">
        <i class="fas fa-home"></i>
        Home
    </button>

</header>





<div class="container">




<div class="summary">


<h2>

Warranty Claim Monitoring Dashboard

</h2>


<p>

Monitor warranty claim SO approval status.

</p>


</div>





<div class="search-box">


<input 
type="text"
id="soSearch"
placeholder="Search SO No..."
onkeyup="filterSO()">



<button onclick="clearSearch">

Clear

</button>


</div>







<table>


<colgroup>

<col class="date">

<col class="so">

<col class="customer">

<col class="brand">

<col class="claim-status">

<col class="coo-status">


</colgroup>





<thead>


<tr>


<th>Date Submitted</th>

<th>SO No.</th>

<th>Customer Name</th>

<th>Brand Name</th>

<th>Warranty Claim Status</th>

<th>Warranty SO Approval by COO</th>


</tr>


</thead>





<tbody id="approvalTable">


<tr>

<td colspan="6" align="center">

Loading approval records...

</td>


</tr>


</tbody>



</table>



</div>









<script>


const SHEET_ID =
"1x5XTCLu9A2OtbAm8X-3x8rsZgzublUPo-W6tJKezAMw";


const SHEET_NAME =
"Form Responses 1";



let approvalData=[];





async function loadApproval(){


try{


const response = await fetch(

`https://opensheet.elk.sh/${SHEET_ID}/${encodeURIComponent(SHEET_NAME)}`

);



approvalData = await response.json();



console.log(approvalData);



displayApproval(approvalData);



}


catch(error){


console.error(error);



document.getElementById("approvalTable").innerHTML=


`

<tr>

<td colspan="6" style="color:red;text-align:center">

Failed to load COO approval data.

</td>

</tr>

`;



}


}







function displayApproval(data){


let html="";



data.forEach(row=>{


const claimStatus =

(row["Warranty SO Claim Status"] || "")

.trim();




const cooStatus =

(row["Warranty SO Approval by COO"] ||

row["Warranty SO Approval by Ms. Carina"] ||

""

)

.trim();






let cooClass="pending";



switch(cooStatus.toLowerCase()){



case "approved":

cooClass="approved";

break;



case "rejected":

cooClass="rejected";

break;



case "for approval":

case "awaiting approval":

cooClass="for-approval";

break;



}




html +=


`

<tr>


<td>

${row["Timestamp"] || "-"}

</td>



<td>

${row["SO No"] || "-"}

</td>




<td>

${row["Customer Name"] || "-"}

</td>



<td>

${row["Brand Name:"] || row["Brand Name"] || "-"}

</td>



<td>

<span class="status pending">

${claimStatus || "Pending"}

</span>

</td>




<td>

<span class="status ${cooClass}">

${cooStatus || "Pending"}

</span>

</td>



</tr>


`;



});



document.getElementById("approvalTable").innerHTML=html;


}







function filterSO(){


const search =

document.getElementById("soSearch")
.value
.toLowerCase();




const filtered = approvalData.filter(row=>{


return (

row["SO No"] || ""

)

.toLowerCase()

.includes(search);



});



displayApproval(filtered);



}






function clearSearch(){


document.getElementById("soSearch").value="";


displayApproval(approvalData);



}





loadApproval();


function goHome(){
    window.location.href = "home.html";
}


</script>




</body>

</html>
