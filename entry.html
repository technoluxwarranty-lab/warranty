<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warranty Management System</title>

<style>

/* HEADER */
header {
    background: #1f2937;
    color: #fff;
    padding: 10px 24px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
    box-sizing: border-box;
}

.header-title {
    font-size: 18px;
    font-weight: 600;
    margin: 0;
}

.header-logo {
    height: 28px;
}

/* BODY */
body {
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(rgba(255,255,255,0.90),rgba(255,255,255,0.90)),
    url("background.jpg");
    background-size: cover;
    background-attachment: fixed;
    margin: 0;
    padding: 0;
}

/* CONTENT */
main {
    padding: 25px;
    max-width: 1200px;
    margin: auto;
}

h2 {
    text-align: center;
    color: #1f2937;
    margin-bottom: 25px;
}

.controls {
    max-width: 700px;
    margin: 0 auto 20px;
}

#searchInput {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* CARDS */
.brands {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 700px;
    margin: auto;
}

.brand-card {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
}

.brand-card h3 {
    margin: 0;
}

.badge {
    display: inline-block;
    background: #e5eefc;
    color: #1e40af;
    padding: 6px 10px;
    border-radius: 20px;
    font-size: 13px;
    margin-top: 6px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    font-size: 13px;
    color: #6b7280;
}

</style>

</head>

<body>

<header>
    <h3 class="header-title">WARRANTY MANAGEMENT SYSTEM</h3>
    <img src="company-logo.png" class="header-logo">
</header>

<main>

<h2>WARRANTY COVERAGE</h2>

<div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 Search brand name...">
</div>

<div class="brands" id="brandContainer">

    <!-- SAMPLE CARD -->
    <div class="brand-card">
        <h3>AMANA/MENUMASTER</h3>
        <span class="badge">ALL ACCOUNTS - 1 year</span>
    </div>

    <div class="brand-card">
        <h3>ANTUNES</h3>
        <span class="badge">BURGER KING & MCDO - 2 years</span><br>
        <span class="badge">JOLLIBEE & GENERAL MARKET - 1 year</span>
    </div>

    <div class="brand-card">
        <h3>CARPIGIANI</h3>
        <span class="badge">MCDO, BK, KFC - 1 year</span><br>
        <span class="badge">JOLLIBEE - 3 years</span>
    </div>

</div>

</main>

<footer>© 2026 Warranty Section</footer>

<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbylT6fyrv0yj6n1HQxgS6v-4nlxg33aRLFc0bx0li5PkSM0c4OB_cxYGFqEGXRXdA/exec";

/* =========================
   SEARCH FILTER
========================= */
const searchInput = document.getElementById("searchInput");
const cards = document.querySelectorAll(".brand-card");

searchInput.addEventListener("keyup", () => {
    let filter = searchInput.value.toLowerCase();

    cards.forEach(card => {
        let brand = card.querySelector("h3").textContent.toLowerCase();
        card.style.display = brand.includes(filter) ? "" : "none";
    });
});

/* =========================
   ACCESS CONTROL CORE
========================= */

function normalize(text) {
    return (text || "").toString().trim().toLowerCase();
}

async function checkAccess(email, onDenied) {
    try {
        const res = await fetch(WEB_APP_URL + "?email=" + encodeURIComponent(email));
        const json = await res.json();

        console.log("ACCESS RESPONSE:", json);

        const status = normalize(json.status);

        if (status !== "approved") {
            onDenied(status);
        }

    } catch (err) {
        console.log(err);
        alert("Unable to verify access.");
        window.location = "index.html";
    }
}

/* =========================
   STARTUP CHECK
========================= */

const user = localStorage.getItem("warrantyUser");

if (!user) {
    alert("Access denied. Please request permission first.");
    window.location = "index.html";
} else {

    checkAccess(user, (status) => {
        alert("Access status: " + status);
        localStorage.removeItem("warrantyUser");
        window.location = "index.html";
    });

}

/* =========================
   AUTO RECHECK (LIVE SESSION)
========================= */

setInterval(() => {

    const user = localStorage.getItem("warrantyUser");
    if (!user) return;

    checkAccess(user, () => {
        localStorage.removeItem("warrantyUser");
        window.location = "index.html";
    });

}, 5000);

</script>

</body>
</html>
