<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>

body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f0f2f5;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    width:350px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    width:100%;
    padding:12px;
    background:#2575fc;
    color:white;
    border:none;
    cursor:pointer;
}

.error{
    color:red;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>User Login</h2>

<input type="email"
       id="email"
       placeholder="Enter Email">

<button onclick="login()">
Login
</button>

<div id="msg" class="error"></div>

</div>

<script>

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbylT6fyrv0yj6n1HQxgS6v-4nlxg33aRLFc0bx0li5PkSM0c4OB_cxYGFqEGXRXdA/exec";

function login(){

    const email =
        document.getElementById("email").value.trim();

    if(!email){
        document.getElementById("msg").innerHTML =
            "Please enter email";
        return;
    }

    fetch(
      `${WEBAPP_URL}?email=${encodeURIComponent(email)}`
    )
    .then(r=>r.json())
    .then(data=>{

        if(data.approved){

            sessionStorage.setItem(
                "loggedIn",
                "true"
            );

            sessionStorage.setItem(
                "userEmail",
                email
            );

            window.location.href="home.html";

        }else{

            document.getElementById("msg").innerHTML =
                "Access denied. Email not approved.";

        }

    })
    .catch(err=>{

        document.getElementById("msg").innerHTML =
            "Connection error";

    });

}

</script>

</body>
</html>
