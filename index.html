<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warranty Management System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    min-height:100vh;
    background:url('background.jpg') no-repeat center center fixed;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    width:90%;
    max-width:1000px;
}


.dashboard-title {
    font-size:42px;
    font-weight:900;
    text-align:center;
    color:white;
    margin-bottom:50px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,0,0,.5);
}


.dashboard {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}


.card {
    border-radius:15px;
    text-align:center;
    padding:40px 20px;
    color:white;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0 8px 25px rgba(0,0,0,.5);
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}


.card:nth-child(2){
    background:linear-gradient(135deg,#ff7e5f,#feb47b);
}


.card:nth-child(3){
    background:linear-gradient(135deg,#43cea2,#185a9d);
}


.card:hover{
    transform:translateY(-10px);
}


.card i{
    font-size:50px;
    margin-bottom:15px;
}


/* LOGIN POPUP */

#accessModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
}


.modal-box{

background:white;
padding:30px;
width:350px;
border-radius:15px;
text-align:center;

}


.modal-box input{

width:90%;
padding:12px;
margin:15px;

}


.modal-box button{

padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2575fc;
color:white;

}


</style>


</head>


<body>


<div class="overlay">


<div class="dashboard-title">
WARRANTY MANAGEMENT SYSTEM
</div>


<div class="dashboard">


<a href="warranty.html" class="card">

<i class="fas fa-file-alt"></i>
<h2>Warranty Requirements</h2>

</a>



<!-- SECURITY CHECK -->

<div class="card" onclick="requestAccess()">

<i class="fas fa-shield-alt"></i>

<h2>
Warranty Coverage
</h2>

</div>


<a href="https://docs.google.com/forms/d/e/1FAIpQLSdNgDZyztOvgYueVM3GAC6G08IjRd5cce6tHnVRxitxvjZHsg/viewform" 
class="card">


<i class="fas fa-clipboard-check"></i>

<h2>
Warranty Sales Order Registration
</h2>


</a>


</div>

</div>



<!-- ACCESS REQUEST -->

<div id="accessModal">


<div class="modal-box">


<h3>
Warranty Coverage Access
</h3>


<p>
Enter your Gmail account.
Admin approval is required before access.
</p>


<input 
type="email" 
id="gmail"
placeholder="example@gmail.com">



<button onclick="submitRequest()">
Request Access
</button>



</div>


</div>

    <script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbylT6fyrv0yj6n1HQxgS6v-4nlxg33aRLFc0bx0li5PkSM0c4OB_cxYGFqEGXRXdA/exec";


// ----------------------
// OPEN MODAL
// ----------------------
function requestAccess() {
    document.getElementById("accessModal").style.display = "flex";
}


// ----------------------
// SUBMIT REQUEST
// ----------------------
function submitRequest() {

    const email = document.getElementById("gmail").value.trim();

    if (!email) {
        alert("Please enter Gmail account.");
        return;
    }

    if (!email.endsWith("@gmail.com")) {
        alert("Only Gmail account is allowed.");
        return;
    }

    fetch(WEB_APP_URL, {
        method: "POST",
        body: new URLSearchParams({
            email: email,
            action: "request"
        })
    })
    .then(res => res.text())
    .then(text => {

        console.log("RAW RESPONSE:", text);

        alert("Request submitted. Waiting for admin approval...");

        // Save email locally for auto-checking status
        localStorage.setItem("userEmail", email);

        document.getElementById("accessModal").style.display = "none";
        document.getElementById("gmail").value = "";

        // Start auto-checking approval status
        startApprovalCheck();

    })
    .catch(err => {

        console.error("ERROR:", err);
        alert("Failed to send request. Check Apps Script deployment.");

    });

}


// ----------------------
// CHECK APPROVAL STATUS
// ----------------------
function checkApprovalStatus(email) {

    fetch(WEB_APP_URL + "?email=" + encodeURIComponent(email))
    .then(res => res.json())
    .then(data => {

        console.log("STATUS RESPONSE:", data);

        if (data.status === "Approved") {

            document.getElementById("statusBox").innerHTML =
                "✅ APPROVED - Access Granted";

            document.getElementById("statusBox").style.color = "green";

        } else {

            document.getElementById("statusBox").innerHTML =
                "⏳ Pending Admin Approval...";

            document.getElementById("statusBox").style.color = "orange";
        }

    })
    .catch(err => {
        console.error("STATUS CHECK ERROR:", err);
    });

}


// ----------------------
// AUTO POLLING (REAL-TIME)
// ----------------------
function startApprovalCheck() {

    const email = localStorage.getItem("userEmail");

    if (!email) return;

    // check immediately
    checkApprovalStatus(email);

    // then repeat every 3 seconds
    setInterval(() => {
        checkApprovalStatus(email);
    }, 3000);
}


// ----------------------
// AUTO RUN ON PAGE LOAD
// ----------------------
window.onload = function () {
    const email = localStorage.getItem("userEmail");

    if (email) {
        startApprovalCheck();
    }
};


// ----------------------
// CLOSE MODAL WHEN CLICK OUTSIDE
// ----------------------
window.onclick = function(event) {
    let modal = document.getElementById("accessModal");
    if (event.target === modal) {
        modal.style.display = "none";
    }
};

</script>

</body>
</html>
