<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Warranty Management System</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}


.login-box{

    width:420px;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    text-align:center;

}


.logo{

    font-size:55px;
    color:#2575fc;
    margin-bottom:15px;

}


h2{

    color:#222;
    margin-bottom:10px;

}


.subtitle{

    color:#666;
    font-size:14px;
    margin-bottom:25px;

}


.input-group{

    position:relative;

}


.input-group i{

    position:absolute;
    left:15px;
    top:15px;
    color:#777;

}


input{

    width:100%;
    padding:14px 14px 14px 45px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;

}


button{

    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2575fc;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;

}


button:disabled{

    opacity:.7;

}


.message{

    margin-top:15px;
    padding:12px;
    border-radius:8px;
    display:none;

}


.success{

background:#d4edda;
color:#155724;

}


.pending{

background:#fff3cd;
color:#856404;

}


.error{

background:#f8d7da;
color:#721c24;

}


.spinner{

display:none;
margin-top:15px;

}


.footer{

margin-top:20px;
font-size:12px;
color:#888;

}

</style>

</head>


<body>


<div class="login-box">


<div class="logo">

<i class="fas fa-shield-alt"></i>

</div>


<h2>
Warranty Management System
</h2>


<p class="subtitle">
Enter provided details below to request access.
</p>



<div class="input-group">

<i class="fas fa-envelope"></i>

<input
id="email"
type="email"
placeholder="Enter your email">

</div>

<div class="input-group" style="margin-top:15px;">

    <i class="fas fa-map-marker-alt"></i>

    <input
        id="area"
        type="text"
        placeholder="Enter your Area/SP/VisMin/Head Office">

</div>



<button 
id="loginBtn"
onclick="login()">

<i class="fas fa-sign-in-alt"></i>
Login

</button>



<div class="spinner" id="spinner">

<i class="fas fa-spinner fa-spin"></i>

</div>



<div id="msg" class="message"></div>



<div class="footer">

Access is subject to administrator approval.

</div>

<div class="footer">

Version 1.4

</div>


</div>




<script>


const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbylT6fyrv0yj6n1HQxgS6v-4nlxg33aRLFc0bx0li5PkSM0c4OB_cxYGFqEGXRXdA/exec";




function showMessage(type,text){

    const msg =
    document.getElementById("msg");


    msg.className =
    "message " + type;


    msg.style.display="block";


    msg.innerHTML=text;

}




function login(){

const email =
document.getElementById("email").value.trim();

const area =
document.getElementById("area").value.trim();

if(email===""){

    showMessage(
        "error",
        "Please enter your email."
    );

    return;

}

if(area===""){

    showMessage(
        "error",
        "Please enter your Area/SP/Head Office."
    );

    return;

}


const btn =
document.getElementById("loginBtn");


btn.disabled=true;



document.getElementById("spinner")
.style.display="block";




fetch(
`${WEBAPP_URL}?email=${encodeURIComponent(email)}&area=${encodeURIComponent(area)}&t=${Date.now()}`,
{
    method:"GET"
})



.then(response=>response.json())



.then(data=>{


console.log(data);



if(!data.success){


showMessage(
"error",
data.message
);


return;

}




sessionStorage.setItem(
"userEmail",
data.email
);




if(data.approved){



sessionStorage.setItem(
"loggedIn",
"true"
);



showMessage(
"success",
"Access approved. Redirecting..."
);



setTimeout(()=>{


window.location.href="home.html";


},1200);



}

else{


showMessage(
"pending",
"Your access request is pending approval."
);


}



})

.catch(error=>{


console.error(error);


showMessage(
"error",
"Unable to connect to server. Please try again."
);


})



.finally(()=>{


btn.disabled=false;


document.getElementById("spinner")
.style.display="none";


});

}

</script>

</body>
</html>
