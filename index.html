<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warranty Management System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    min-height:100vh;
    background:url('background.jpg') no-repeat center center fixed;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

.overlay{
    width:90%;
    max-width:1000px;
}


.dashboard-title {
    font-size:42px;
    font-weight:900;
    text-align:center;
    color:white;
    margin-bottom:50px;
    padding:20px;
    border-radius:15px;
    background:rgba(0,0,0,.5);
}


.dashboard {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}


.card {
    border-radius:15px;
    text-align:center;
    padding:40px 20px;
    color:white;
    cursor:pointer;
    text-decoration:none;
    box-shadow:0 8px 25px rgba(0,0,0,.5);
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}


.card:nth-child(2){
    background:linear-gradient(135deg,#ff7e5f,#feb47b);
}


.card:nth-child(3){
    background:linear-gradient(135deg,#43cea2,#185a9d);
}


.card:hover{
    transform:translateY(-10px);
}


.card i{
    font-size:50px;
    margin-bottom:15px;
}


/* LOGIN POPUP */

#accessModal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.7);
justify-content:center;
align-items:center;
}


.modal-box{

background:white;
padding:30px;
width:350px;
border-radius:15px;
text-align:center;

}


.modal-box input{

width:90%;
padding:12px;
margin:15px;

}


.modal-box button{

padding:12px 25px;
border:none;
border-radius:8px;
cursor:pointer;
background:#2575fc;
color:white;

}


</style>


</head>


<body>


<div class="overlay">


<div class="dashboard-title">
WARRANTY MANAGEMENT SYSTEM
</div>


<div class="dashboard">


<a href="warranty.html" class="card">

<i class="fas fa-file-alt"></i>
<h2>Warranty Requirements</h2>

</a>



<!-- SECURITY CHECK -->

<div class="card" onclick="requestAccess()">

<i class="fas fa-shield-alt"></i>

<h2>
Warranty Coverage
</h2>

</div>


<a href="https://docs.google.com/forms/d/e/1FAIpQLSdNgDZyztOvgYueVM3GAC6G08IjRd5cce6tHnVRxitxvjZHsg/viewform" 
class="card">


<i class="fas fa-clipboard-check"></i>

<h2>
Warranty Claim Entry
</h2>


</a>


</div>

</div>



<!-- ACCESS REQUEST -->

<div id="accessModal">


<div class="modal-box">


<h3>
Warranty Coverage Access
</h3>


<p>
Enter your Gmail account.
Admin approval is required before access.
</p>


<input 
type="email" 
id="gmail"
placeholder="example@gmail.com">



<button onclick="submitRequest()">
Request Access
</button>



</div>


</div>


<script>

const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwl58L8njaTvv5Ocn972dptcx6s2N31V1weXj9elVCHFL7R2S7NL2oUWuhV4YS3Woxi/exec";


function requestAccess() {
  document.getElementById("accessModal").style.display = "flex";
}


function submitRequest() {

  let email = document.getElementById("gmail").value.trim();


  if (email === "") {
    alert("Please enter Gmail account.");
    return;
  }


  if (!email.endsWith("@gmail.com")) {
    alert("Only Gmail account is allowed.");
    return;
  }


  let payload = {
    email: email,
    request: "Warranty Coverage Access"
  };


  fetch(WEB_APP_URL, {

    method: "POST",

    headers: {
      "Content-Type": "application/json"
    },

    body: JSON.stringify(payload)

  })

  .then(response => response.json())

  .then(result => {

    console.log(result);


    if(result.status === "success") {

      alert(
        "Access request submitted. Please wait for Admin approval."
      );

      document.getElementById("accessModal").style.display = "none";
      document.getElementById("gmail").value = "";

    } else {

      alert(
        "Request failed: " + result.message
      );

    }

  })


  .catch(error => {

    console.error(error);

    alert(
      "Failed to send request. Please try again."
    );

  });

}



window.onclick = function(event) {

  let modal = document.getElementById("accessModal");

  if (event.target === modal) {

    modal.style.display = "none";

  }

};
    
</script>



</body>
</html>
