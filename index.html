<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warranty Management System</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
    body {
        font-family: 'Arial', sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: url('background.jpg') no-repeat center center fixed;
        background-size: cover;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    /* Dashboard title */
    .dashboard-title {
        font-size: 42px;
        font-weight: 900;
        text-align: center;
        color: #fff;
        margin-bottom: 50px;
        padding: 20px 30px;
        border-radius: 15px;
        background: rgba(0,0,0,0.5); /* solid background for visibility */
        box-shadow: 0 0 20px rgba(0,0,0,0.7);
        letter-spacing: 2px;
    }

    .dashboard-title i {
        display: block;
        font-size: 60px;
        margin-bottom: 15px;
        color: #ffd700; /* gold icon for emphasis */
        text-shadow: 0 0 15px rgba(255, 215, 0, 0.8);
    }

    /* Dashboard cards */
    .dashboard {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 25px;
        width: 100%;
    }

    .card {
        border-radius: 15px;
        text-align: center;
        padding: 40px 20px;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        color: #fff;
        box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
    }

    .card:nth-child(2) {
        background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
    }

    .card:nth-child(3) {
        background: linear-gradient(135deg, #43cea2 0%, #185a9d 100%);
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.6);
    }

    .card i {
        font-size: 50px;
        margin-bottom: 15px;
    }

    .card h2 {
        font-size: 20px;
        margin: 0;
        font-weight: bold;
    }

    /* Mobile adjustments */
    @media(max-width:500px){
        .dashboard-title {
            font-size: 28px;
            padding: 15px 20px;
            margin-bottom: 30px;
        }
        .dashboard-title i {
            font-size: 45px;
        }
        .card {
            padding: 25px 10px;
        }
        .card i {
            font-size: 35px;
            margin-bottom: 10px;
        }
        .card h2 {
            font-size: 16px;
        }
    }
</style>
</head>
<body>

<div class="overlay">
    <!-- Centered Dashboard Title -->
    <div class="dashboard-title">WARRANTY MANAGEMENT SYSTEM
    </div>

    <!-- Dashboard cards -->
    <div class="dashboard">
        <a href="warranty.html" class="card">
            <i class="fas fa-file-alt"></i>
            <h2>Warranty Requirements</h2>
        </a>
        <a href="entry.html" class="card">
            <i class="fas fa-shield-alt"></i>
            <h2>Warranty Coverage</h2>
        </a>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSdNgDZyztOvgYueVM3GAC6G08IjRd5cce6tHnVRxitxvjZHsg/viewform" class="card">
            <i class="fas fa-clipboard-check"></i>
            <h2>Warranty Sales Order Registration</h2>
        </a>
    </div>
</div>

</body>
</html>
